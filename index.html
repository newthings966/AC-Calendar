<!DOCTYPE html>
<html>
<head>
    <title>AC Calendar Converter</title>
   <style>
   body {
    background-image: url("hubble2019_01.jpg"); /* your image file name */
    background-size: cover;       /* makes it fill screen */
    background-position: center;  /* keeps it centered */
    background-repeat: no-repeat; /* prevents tiling */
    background-attachment: fixed; /* optional: slight parallax effect */

    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 100px;
}

    h1 {
        font-size: 50px;          /* bigger title */
        margin-bottom: 30px;
    }

    input, button {
        font-size: 23px;
        padding: 10px 14px;
    }

    #result {
        font-size: 40px;          /* bigger AC date */
        margin-top: 30px;
        font-weight: bold;
    }

    #countdown {
        font-size: 45px;          /* bigger countdown */
        margin-top: 35px;
    }

#acMonths {
    margin-top: 50px;
    font-size: 18px;
}

.months-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 600px;
    margin: 0 auto;
}

.months-grid div {
    background: rgba(0, 0, 0, 0.6);
    padding: 8px;
    border-radius: 8px;
}

</style>
</head>
<body>

<h1>AC Calendar Converter</h1>

<input type="date" id="gregDate">
<button onclick="convertToAC()">Convert</button>

<div id="result"></div>
<div id="countdown" style="margin-top:20px; font-size:20px;"></div>

<div id="acMonths">
    <h2>AC Months</h2>
    <div class="months-grid">
        <div>1st Month: March</div>
        <div>2nd Month: Twenar</div>
        <div>3rd Month: Triaine</div>
        <div>4th Month: Cianne</div>
        <div>5th Month: Cincé</div>
        <div>6th Month: Senarember</div>
        <div>7th Month: September</div>
        <div>8th Month: October</div>
        <div>9th Month: November</div>
        <div>10th Month: December</div>
        <div>11th Month: Aukaxine</div>
        <div>12th Month: Dozamiy</div>
    </div>
</div>

<script>

function isLeapYear(year) {
    return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
}

function convertToAC() {

    let input = document.getElementById("gregDate").value;
    if (!input) return;

    let parts = input.split("-");
let date = new Date(parts[0], parts[1] - 1, parts[2]);
    let year = date.getFullYear();

    // AC Year Logic
    let acYear = (date < new Date(year, 2, 20)) ? year - 1 : year;

    // Month lengths in your AC system
    let monthLengths = [30, 31, 32, 31, 31, 31, 31, 29, 30, 30, 29, 30];

    // Leap year adjustment for Dozamiy
    if (isLeapYear(acYear + 1)) {
        monthLengths[11] = 31;
    }

    let acStart = new Date(acYear, 2, 20, 0, 0, 0);
    let utcDate = Date.UTC(date.getFullYear(), date.getMonth(), date.getDate());
let utcStart = Date.UTC(acStart.getFullYear(), acStart.getMonth(), acStart.getDate());

let diff = Math.floor((utcDate - utcStart) / (1000 * 60 * 60 * 24));

    if (diff < 0) {
    acStart = new Date(acYear - 1, 2, 20, 0, 0, 0);

    let utcStartPrev = Date.UTC(
        acStart.getFullYear(),
        acStart.getMonth(),
        acStart.getDate()
    );

    diff = Math.floor((utcDate - utcStartPrev) / (1000 * 60 * 60 * 24));

    acYear = acYear - 1;
}

    let monthNames = [
        "March",
        "Twenar",
        "Triaine",
        "Cianne",
        "Cincé",
        "Senarember",
        "September",
        "October",
        "November",
        "December",
        "Aukaxine",
        "Dozamiy"
    ];

    let monthIndex = 0;

    while (diff >= monthLengths[monthIndex]) {
        diff -= monthLengths[monthIndex];
        monthIndex++;
    }

    let acMonth = monthNames[monthIndex];
    let acDay = diff + 1;

    document.getElementById("result").innerHTML =
        `AC Date: ${acMonth} ${acDay}, ${acYear}`;
}

function showTodayAC() {

    let now = new Date();

// If it's before 6 AM, treat it as yesterday
if (now.getHours() < 6) {
    now.setDate(now.getDate() - 1);
}

let today = now;

    let year = today.getFullYear();
    let month = today.getMonth();
    let day = today.getDate();

    // Auto-fill date input
    document.getElementById("gregDate").value =
        `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

    convertToAC();
}

function auto6AMUpdate() {

    let now = new Date();

    let nextUpdate = new Date(
        now.getFullYear(),
        now.getMonth(),
        now.getDate(),
        6, 0, 0
    );

    // If it's already past 6 AM today, schedule for tomorrow
    if (now >= nextUpdate) {
        nextUpdate.setDate(nextUpdate.getDate() + 1);
    }

    let timeUntilUpdate = nextUpdate - now;

    setTimeout(function() {
        showTodayAC();
        auto6AMUpdate();
    }, timeUntilUpdate);
}

window.onload = function() {
    showTodayAC();
    auto6AMUpdate();
    startNewYearCountdown();
};

function startNewYearCountdown() {

    function updateCountdown() {

showTodayAC();

        let now = new Date();
        let year = now.getFullYear();

        // AC New Year = March 20 at 6:00 AM
        let nextNewYear = new Date(year, 2, 20, 6, 0, 0);

        if (now >= nextNewYear) {
            nextNewYear = new Date(year + 1, 2, 20, 6, 0, 0);
        }

        let diff = nextNewYear - now;

        // 🎉 If it's EXACTLY New Year moment
        if (diff <= 0 && diff > -1000) {
            document.getElementById("countdown").innerHTML =
                "🎉 HAPPY NEW YEAR 🎉";
            return;
        }

        let days = Math.floor(diff / (1000 * 60 * 60 * 24));
        let hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        let minutes = Math.floor((diff / (1000 * 60)) % 60);
        let seconds = Math.floor((diff / 1000) % 60);

        document.getElementById("countdown").innerHTML =
            `AC New Year Countdown: ${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
}
</script>

</body>
</html>
